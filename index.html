<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>이벤트 대기 등록</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
  background: #101014;
  color: #fff;
}

.wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.card {
  width: 100%;
  max-width: 420px;
  background: #1b1b22;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  padding: 28px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.4);
}

.badge {
  display: inline-flex;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  font-size: 13px;
  color: #cfcfd8;
  margin-bottom: 18px;
}

h1 {
  font-size: 28px;
  line-height: 1.25;
  margin: 0 0 12px;
}

p {
  color: #b9b9c5;
  line-height: 1.6;
}

input {
  width: 100%;
  height: 52px;
  border: 0;
  border-radius: 14px;
  padding: 0 16px;
  margin: 8px 0;
  font-size: 16px;
  outline: none;
  background: #2a2a34;
  color: #fff;
}

button {
  width: 100%;
  height: 54px;
  border: 0;
  border-radius: 16px;
  margin-top: 12px;
  background: #6ee7b7;
  color: #07130f;
  font-weight: 800;
  font-size: 16px;
  cursor: pointer;
}

button.secondary {
  background: #2f2f3a;
  color: #fff;
}

.ticket {
  text-align: center;
  padding: 24px;
  border-radius: 22px;
  background: #24242d;
  margin: 20px 0;
}

.ticketNo {
  font-size: 64px;
  font-weight: 900;
  letter-spacing: -2px;
  color: #6ee7b7;
}

.statusBox {
  margin-top: 18px;
  padding: 18px;
  border-radius: 18px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
}

.statusBox.called {
  background: rgba(110,231,183,0.12);
  border-color: rgba(110,231,183,0.5);
}

.statusTitle {
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 8px;
}

.message {
  font-size: 16px;
  line-height: 1.6;
  color: #fff;
}

.small {
  font-size: 13px;
  color: #8f8f9b;
  margin-top: 14px;
}

.hidden {
  display: none;
}

.pulse {
  width: 10px;
  height: 10px;
  display: inline-block;
  border-radius: 50%;
  background: #6ee7b7;
  margin-right: 8px;
  animation: pulse 1.2s infinite;
}

@keyframes pulse {
  0% { transform: scale(0.9); opacity: 0.5; }
  50% { transform: scale(1.3); opacity: 1; }
  100% { transform: scale(0.9); opacity: 0.5; }
}
</style>
</head>

<body>
<div class="wrap">
  <div class="card">
    <div class="badge">EVENT WAITING SYSTEM</div>

    <div id="joinView">
      <h1>대기 등록</h1>
      <p>
        한 공간에 입장 인원이 제한되어 있습니다.<br>
        대기 등록 후 입장 가능 시 이 화면에 안내 메시지가 표시됩니다.
      </p>

      <input id="name" placeholder="이름 또는 닉네임" maxlength="30" />
      <input id="phoneLast4" placeholder="휴대폰 뒤 4자리 선택 입력" maxlength="4" inputmode="numeric" />

      <button onclick="joinQueue()">대기번호 발급받기</button>
      <!-- <button class="secondary" onclick="resetForTest()">테스트용 새로고침</button> !-->

      <p class="small">
        화면을 닫아도 대기 정보는 저장됩니다. 같은 휴대폰에서 다시 QR을 열면 기존 대기번호를 확인할 수 있습니다.
      </p>
    </div>

    <div id="ticketView" class="hidden">
      <h1>대기번호</h1>

      <div class="ticket">
        <div class="ticketNo" id="ticketNo">---</div>
        <div class="small">내 대기번호</div>
      </div>

      <div id="statusBox" class="statusBox">
        <div class="statusTitle" id="statusTitle">
          <span class="pulse"></span>대기 중
        </div>
        <div class="message" id="message">
          입장 가능 시 이 화면에 안내 메시지가 표시됩니다.
        </div>
      </div>

      <button class="secondary" onclick="copyMyLink()">내 대기 링크 복사</button>
      <button class="secondary" onclick="manualCheck()">지금 상태 확인</button>

      <p class="small" id="lastChecked">
        자동 확인 준비 중
      </p>

      <p class="small">
        이 화면은 5초마다 자동으로 최신 상태를 확인합니다. 직접 새로고침하지 않아도 됩니다.
      </p>
    </div>
  </div>
</div>

<script>
/* Lambda Function URL을 여기에 붙여 넣으세요. */
const API_URL = "https://r7tohzqmykuodoscqmjcxrdodq0dpdli.lambda-url.ap-northeast-2.on.aws/";
const POLL_MS = 5000;

let currentTicketId = null;
let pollTimer = null;
const RESET_KEY = "event_wait_reset_at";
const TICKET_ISSUED_AT_KEY = "event_wait_ticket_issued_at";

function getParam(name) {
  return new URLSearchParams(location.search).get(name);
}

function saveTicket(ticketId) {
  localStorage.setItem("event_wait_ticket_id", ticketId);
  if (!localStorage.getItem(TICKET_ISSUED_AT_KEY)) {
    localStorage.setItem(TICKET_ISSUED_AT_KEY, String(Date.now()));
  }
}

function getSavedTicket() {
  return localStorage.getItem("event_wait_ticket_id");
}

function clearSavedTicket() {
  localStorage.removeItem("event_wait_ticket_id");
  localStorage.removeItem(TICKET_ISSUED_AT_KEY);
}

function isTicketExpiredByReset() {
  const resetAt = Number(localStorage.getItem(RESET_KEY) || 0);
  const ticketIssuedAt = Number(localStorage.getItem(TICKET_ISSUED_AT_KEY) || 0);
  return Boolean(resetAt && ticketIssuedAt && resetAt > ticketIssuedAt);
}
	
function showTicketView() {
  document.getElementById("joinView").classList.add("hidden");
  document.getElementById("ticketView").classList.remove("hidden");
}

function showJoinView() {
  document.getElementById("joinView").classList.remove("hidden");
  document.getElementById("ticketView").classList.add("hidden");
}

function setLoading(text) {
  document.getElementById("lastChecked").textContent = text;
}

async function joinQueue() {
  const name = document.getElementById("name").value.trim() || "고객";
  const phoneLast4 = document.getElementById("phoneLast4").value.trim();

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        action: "join",
        name,
        phoneLast4
      })
    });

    const json = await res.json();

    if (!json.ok) {
      alert(json.message || "대기 등록에 실패했습니다.");
      return;
    }

    currentTicketId = json.ticketId;
    clearSavedTicket();
    saveTicket(currentTicketId);

    const url = new URL(location.href);
    url.searchParams.set("ticketId", currentTicketId);
    history.replaceState(null, "", url.toString());

    document.getElementById("ticketNo").textContent = json.ticketNo;
    showTicketView();
    startPolling();
    await checkStatus();

  } catch (err) {
    alert("서버 연결에 실패했습니다. API_URL 또는 CORS 설정을 확인하세요.");
    console.error(err);
  }
}

async function checkStatus() {
  if (!currentTicketId) return;

  try {
    const res = await fetch(`${API_URL}?action=check&ticketId=${encodeURIComponent(currentTicketId)}`);
    const json = await res.json();

    if (!json.ok) {
      clearSavedTicket();
      currentTicketId = null;
      showJoinView();
      setLoading("운영자가 번호를 리셋했습니다. 1번부터 다시 대기 등록해 주세요.");
      alert("운영자가 번호를 리셋했거나 기존 대기번호가 만료되었습니다. 다시 발급받아 주세요.");
      return;
    }

    const data = json.data;

    document.getElementById("ticketNo").textContent = data.ticketNo || "---";
    document.getElementById("message").textContent = data.message || "";

    const statusBox = document.getElementById("statusBox");
    const statusTitle = document.getElementById("statusTitle");

    if (data.status === "CALLED") {
      statusBox.classList.add("called");
      statusTitle.innerHTML = "입장 가능";
      document.title = "입장 가능 - 이벤트 대기";
      vibrate();
    } else if (data.status === "DONE") {
      statusBox.classList.remove("called");
      statusTitle.innerHTML = "입장 완료";
      document.title = "입장 완료 - 이벤트 대기";
    } else {
      statusBox.classList.remove("called");
      statusTitle.innerHTML = '<span class="pulse"></span>대기 중';
      document.title = "대기 중 - 이벤트 대기";
    }

    const now = new Date();
    document.getElementById("lastChecked").textContent =
      `마지막 자동 확인: ${now.toLocaleTimeString("ko-KR")}`;

  } catch (err) {
    console.error(err);
    setLoading("상태 확인 중 오류가 발생했습니다.");
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(checkStatus, POLL_MS);
}

async function manualCheck() {
  await checkStatus();
}

function vibrate() {
  if ("vibrate" in navigator) {
    navigator.vibrate([300, 120, 300]);
  }
}

async function copyMyLink() {
  if (!currentTicketId) return;

  const url = new URL(location.href);
  url.searchParams.set("ticketId", currentTicketId);

  try {
    await navigator.clipboard.writeText(url.toString());
    alert("내 대기 링크가 복사되었습니다.");
  } catch {
    alert(url.toString());
  }
}

function resetForTest() {
  clearSavedTicket();
  currentTicketId = null;
  const url = new URL(location.href);
  url.searchParams.delete("ticketId");
  history.replaceState(null, "", url.toString());
  location.reload();
}

async function boot() {
  const ticketFromUrl = getParam("ticketId");
  const ticketFromStorage = getSavedTicket();

  currentTicketId = ticketFromUrl || ticketFromStorage;
	
  if (isTicketExpiredByReset()) {
    clearSavedTicket();
    currentTicketId = null;
  }

  if (currentTicketId) {
    saveTicket(currentTicketId);

    const url = new URL(location.href);
    url.searchParams.set("ticketId", currentTicketId);
    history.replaceState(null, "", url.toString());

    showTicketView();
    startPolling();
    await checkStatus();
  } else {
    showJoinView();
  }
}

window.addEventListener("storage", (event) => {
  if (event.key === RESET_KEY) {
    clearSavedTicket();
    currentTicketId = null;
    showJoinView();
    alert("운영자가 번호를 리셋했습니다. 1번부터 다시 대기 등록해 주세요.");
  }
});

boot();
</script>
</body>
</html>
